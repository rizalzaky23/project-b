name: fleet_app
description: Fleet Management App - Manajemen Kendaraan Sewa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Network
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Storage
  flutter_secure_storage: ^9.2.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Navigation
  go_router: ^13.2.4

  # Utils
  intl: ^0.19.0
  get_it: ^7.7.0

  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true